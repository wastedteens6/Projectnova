<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-ai-face.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <pattern id="grid-ai-face.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#818cf8" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-ai-face.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-ai-face.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="34" height="22" rx="6" fill="#6366f1" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">AI</text>
  <!-- Main illustration -->
  <circle cx="200" cy="130" r="60" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
           <circle cx="200" cy="120" r="35" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" opacity="0.9"/>
           <circle cx="200" cy="110" r="18" fill="#312e81" opacity="0.8"/>
           <circle cx="193" cy="107" r="4" fill="#818cf8" opacity="0.9"/>
           <circle cx="207" cy="107" r="4" fill="#818cf8" opacity="0.9"/>
           <rect x="185" y="118" width="30" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
           <rect x="80" y="205" width="240" height="12" rx="6" fill="#312e81" opacity="0.6"/>
           <rect x="80" y="225" width="100" height="10" rx="5" fill="#6366f1" opacity="0.7"/>
           <rect x="190" y="225" width="130" height="10" rx="5" fill="#4338ca" opacity="0.5"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-ai-face.svg)" opacity="0.7"/>
</svg>