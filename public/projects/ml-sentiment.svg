      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid-ml-sentiment.svg" width="20" height="20" patternUnits="userSpaceOnUse">
