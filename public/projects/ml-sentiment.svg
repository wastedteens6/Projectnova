  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">ML</text>
  <!-- Main illustration -->
  <rect x="70" y="70" width="260" height="60" rx="10" fill="#1e293b" stroke="#ea580c" stroke-width="1.5" opacity="0.8"/>
           <rect x="80" y="85" width="160" height="16" rx="4" fill="#fb923c" opacity="0.7"/>
