<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-blockchain-nft.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1500"/>
      <stop offset="100%" stop-color="#1e0a2e"/>
    </linearGradient>
    <pattern id="grid-blockchain-nft.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e879f9" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-blockchain-nft.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-blockchain-nft.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="106" height="22" rx="6" fill="#a21caf" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">BLOCKCHAIN</text>
  <!-- Main illustration -->
  <rect x="100" y="60" width="200" height="160" rx="16" fill="#1e0a2e" stroke="#a21caf" stroke-width="2" opacity="0.9"/>
           <rect x="115" y="75" width="170" height="110" rx="10" fill="#2d0f5e" opacity="0.7"/>
           <circle cx="200" cy="130" r="35" fill="none" stroke="#e879f9" stroke-width="2" opacity="0.6"/>
           <polygon points="200,100 225,145 175,145" fill="#e879f9" opacity="0.25" stroke="#e879f9" stroke-width="1.5"/>
           <rect x="115" y="195" width="170" height="14" rx="4" fill="#4c1d95" opacity="0.6"/>
           <rect x="80" y="235" width="250" height="35" rx="10" fill="#1e0a2e" stroke="#a21caf" stroke-width="1.5" opacity="0.8"/>
           <rect x="95" y="247" width="80" height="12" rx="4" fill="#e879f9" opacity="0.4"/>
           <rect x="185" y="247" width="130" height="12" rx="4" fill="#a21caf" opacity="0.4"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-blockchain-nft.svg)" opacity="0.7"/>
</svg>