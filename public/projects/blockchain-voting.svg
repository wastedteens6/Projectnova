<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-blockchain-voting.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1500"/>
      <stop offset="100%" stop-color="#2d1f00"/>
    </linearGradient>
    <pattern id="grid-blockchain-voting.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#fbbf24" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-blockchain-voting.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-blockchain-voting.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="106" height="22" rx="6" fill="#d97706" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">BLOCKCHAIN</text>
  <!-- Main illustration -->
  <rect x="70" y="80" width="80" height="60" rx="8" fill="#2d1f00" stroke="#d97706" stroke-width="2" opacity="0.9"/>
           <rect x="170" y="80" width="80" height="60" rx="8" fill="#2d1f00" stroke="#d97706" stroke-width="2" opacity="0.9"/>
           <rect x="270" y="80" width="60" height="60" rx="8" fill="#2d1f00" stroke="#fbbf24" stroke-width="2" opacity="0.9"/>
           <line x1="150" y1="110" x2="170" y2="110" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
           <line x1="250" y1="110" x2="270" y2="110" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
           <rect x="100" y="170" width="200" height="50" rx="10" fill="#1c1500" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
           <rect x="115" y="185" width="60" height="20" rx="5" fill="#d97706" opacity="0.5"/>
           <rect x="185" y="185" width="100" height="20" rx="5" fill="#fbbf24" opacity="0.3"/>
           <circle cx="110" cy="110" r="12" fill="#fbbf24" opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
           <circle cx="210" cy="110" r="12" fill="#fbbf24" opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
           <circle cx="300" cy="110" r="10" fill="#fbbf24" opacity="0.4" stroke="#d97706" stroke-width="1.5"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-blockchain-voting.svg)" opacity="0.7"/>
