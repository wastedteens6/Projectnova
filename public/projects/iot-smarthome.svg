<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-iot-smarthome.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0f3d3a"/>
    </linearGradient>
    <pattern id="grid-iot-smarthome.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2dd4bf" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-iot-smarthome.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-iot-smarthome.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="43" height="22" rx="6" fill="#0d9488" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">IOT</text>
  <!-- Main illustration -->
  <polygon points="200,55 290,120 290,230 110,230 110,120" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.8"/>
           <rect x="170" y="170" width="60" height="60" rx="4" fill="#0f3d3a" stroke="#2dd4bf" stroke-width="1.5" opacity="0.8"/>
           <circle cx="150" cy="130" r="12" fill="#0d9488" opacity="0.8" stroke="#2dd4bf" stroke-width="1.5"/>
           <circle cx="250" cy="130" r="12" fill="#0d9488" opacity="0.8" stroke="#2dd4bf" stroke-width="1.5"/>
           <circle cx="200" cy="100" r="10" fill="#2dd4bf" opacity="0.6"/>
           <line x1="200" y1="100" x2="150" y2="130" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
           <line x1="200" y1="100" x2="250" y2="130" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
           <line x1="200" y1="100" x2="200" y2="170" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-iot-smarthome.svg)" opacity="0.7"/>
</svg>