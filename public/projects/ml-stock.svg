<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-ml-stock.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#1a3320"/>
    </linearGradient>
    <pattern id="grid-ml-stock.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#22c55e" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-ml-stock.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-ml-stock.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="34" height="22" rx="6" fill="#16a34a" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">ML</text>
  <!-- Main illustration -->
  <polyline points="70,220 110,180 140,190 170,140 210,130 240,110 270,120 300,80 330,90" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.9"/>
           <polygon points="100,200 100,170 120,170 120,200" fill="#22c55e" opacity="0.4"/>
           <polygon points="140,200 140,185 160,185 160,200" fill="#ef4444" opacity="0.4"/>
           <polygon points="180,200 180,155 200,155 200,200" fill="#22c55e" opacity="0.4"/>
           <polygon points="220,200 220,165 240,165 240,200" fill="#ef4444" opacity="0.4"/>
           <polygon points="260,200 260,140 280,140 280,200" fill="#22c55e" opacity="0.4"/>
           <line x1="70" y1="220" x2="330" y2="220" stroke="#166534" stroke-width="1" opacity="0.5"/>
           <line x1="70" y1="60" x2="70" y2="220" stroke="#166534" stroke-width="1" opacity="0.5"/>
           <rect x="80" y="60" width="120" height="30" rx="6" fill="#052e16" opacity="0.8" stroke="#16a34a" stroke-width="1"/>
           <text x="95" y="80" font-family="monospace" font-size="11" fill="#22c55e">+2.34%</text>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-ml-stock.svg)" opacity="0.7"/>
</svg>