<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-web-portal.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <pattern id="grid-web-portal.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#38bdf8" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-web-portal.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-web-portal.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="43" height="22" rx="6" fill="#0ea5e9" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">WEB</text>
  <!-- Main illustration -->
  <rect x="60" y="50" width="280" height="200" rx="14" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
           <rect x="60" y="50" width="80" height="200" rx="14" fill="#0f2744" opacity="0.8"/>
           <rect x="155" y="70" width="170" height="50" rx="8" fill="#0f2744" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
           <rect x="155" y="135" width="170" height="35" rx="6" fill="#0f2744" stroke="#0ea5e9" stroke-width="1" opacity="0.6"/>
           <rect x="155" y="180" width="170" height="35" rx="6" fill="#0f2744" stroke="#0ea5e9" stroke-width="1" opacity="0.6"/>
           <circle cx="100" cy="110" r="22" fill="#0ea5e9" opacity="0.2" stroke="#38bdf8" stroke-width="1.5"/>
           <rect x="80" y="145" width="40" height="6" rx="3" fill="#38bdf8" opacity="0.5"/>
           <rect x="80" y="158" width="30" height="4" rx="2" fill="#64748b" opacity="0.5"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-web-portal.svg)" opacity="0.7"/>
</svg>