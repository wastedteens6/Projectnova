<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-data-analytics.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <pattern id="grid-data-analytics.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#38bdf8" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-data-analytics.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-data-analytics.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="52" height="22" rx="6" fill="#0ea5e9" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">DATA</text>
  <!-- Main illustration -->
  <rect x="70" y="65" width="70" height="150" rx="6" fill="#0ea5e9" opacity="0.3" stroke="#38bdf8" stroke-width="1.5"/>
           <rect x="155" y="90" width="70" height="125" rx="6" fill="#0ea5e9" opacity="0.5" stroke="#38bdf8" stroke-width="1.5"/>
           <rect x="240" y="110" width="70" height="105" rx="6" fill="#0ea5e9" opacity="0.4" stroke="#38bdf8" stroke-width="1.5"/>
           <polyline points="85,200 170,145 255,160 325,80" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.8"/>
           <circle cx="85" cy="200" r="4" fill="#a78bfa"/>
           <circle cx="170" cy="145" r="4" fill="#a78bfa"/>
           <circle cx="255" cy="160" r="4" fill="#a78bfa"/>
           <circle cx="325" cy="80" r="4" fill="#a78bfa"/>
           <rect x="70" y="225" width="260" height="2" fill="#1e40af" opacity="0.5"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-data-analytics.svg)" opacity="0.7"/>
</svg>