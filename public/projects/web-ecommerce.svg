<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-web-ecommerce.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <pattern id="grid-web-ecommerce.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#818cf8" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-web-ecommerce.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-web-ecommerce.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="43" height="22" rx="6" fill="#6366f1" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">WEB</text>
  <!-- Main illustration -->
  <rect x="60" y="60" width="280" height="180" rx="12" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
           <rect x="60" y="60" width="280" height="40" rx="12" fill="#312e81" opacity="0.9"/>
           <circle cx="82" cy="80" r="6" fill="#ef4444"/>
           <circle cx="100" cy="80" r="6" fill="#eab308"/>
           <circle cx="118" cy="80" r="6" fill="#22c55e"/>
           <rect x="75" y="115" width="80" height="80" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
           <rect x="170" y="115" width="80" height="80" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
           <rect x="265" y="115" width="60" height="80" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
           <rect x="75" y="205" width="250" height="20" rx="6" fill="#4338ca" opacity="0.5"/>
           <text x="115" y="160" font-family="monospace" font-size="10" fill="#a5b4fc">Product</text>
           <text x="205" y="160" font-family="monospace" font-size="10" fill="#a5b4fc">Cart</text>
           <text x="275" y="155" font-family="monospace" font-size="9" fill="#64748b">Admin</text>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-web-ecommerce.svg)" opacity="0.7"/>
</svg>