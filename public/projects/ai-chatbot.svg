<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-ai-chatbot.svg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d0f5e"/>
    </linearGradient>
    <pattern id="grid-ai-chatbot.svg" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#c084fc" stroke-width="0.35" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-ai-chatbot.svg)"/>
  <!-- Grid -->
  <rect width="400" height="300" fill="url(#grid-ai-chatbot.svg)"/>
  <!-- Category badge -->
  <rect x="14" y="14" width="34" height="22" rx="6" fill="#9333ea" opacity="0.85"/>
  <text x="22" y="29" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="white" letter-spacing="1">AI</text>
  <!-- Main illustration -->
  <rect x="80" y="60" width="240" height="160" rx="16" fill="#2d0f5e" stroke="#9333ea" stroke-width="2" opacity="0.8"/>
           <rect x="100" y="85" width="120" height="28" rx="14" fill="#4c1d95" opacity="0.9"/>
           <rect x="180" y="125" width="120" height="28" rx="14" fill="#6d28d9" opacity="0.9"/>
           <rect x="100" y="165" width="100" height="28" rx="14" fill="#4c1d95" opacity="0.9"/>
           <circle cx="95" cy="99" r="10" fill="#7c3aed"/>
           <circle cx="305" cy="139" r="10" fill="#9333ea"/>
           <circle cx="95" cy="179" r="10" fill="#7c3aed"/>
           <rect x="90" y="235" width="220" height="20" rx="10" fill="#2d0f5e" stroke="#9333ea" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom glow -->
  <rect x="0" y="260" width="400" height="40" fill="url(#bg-ai-chatbot.svg)" opacity="0.7"/>
</svg>